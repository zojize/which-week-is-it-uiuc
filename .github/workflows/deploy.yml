name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Every Monday at midnight Central — both UTC offsets to handle DST
    - cron: '0 5 * * 1'  # midnight CDT (summer)
    - cron: '0 6 * * 1'  # midnight CST (winter)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check-schedule:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check if midnight Monday in Central Time
        id: check
        run: |
          HOUR=$(TZ=America/Chicago date +%-H)
          DAY=$(TZ=America/Chicago date +%u)
          if [ "$DAY" = "1" ] && [ "$HOUR" -le "1" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Not within the first hour of Monday Central (day=$DAY, hour=$HOUR), skipping."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: [check-schedule]
    if: always() && (needs.check-schedule.result == 'skipped' || needs.check-schedule.outputs.should_deploy == 'true')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node build.mjs
        env:
          TZ: America/Chicago
      - name: Commit and push updated og.png
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add og.png
          git diff --cached --quiet || git commit -m "chore: update og.png [skip ci]"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
